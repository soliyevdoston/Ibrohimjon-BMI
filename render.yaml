databases:
  - name: lochin-db
    databaseName: delivery
    user: postgres
    plan: free
    region: frankfurt

services:
  - type: web
    name: lochin-backend
    runtime: node
    region: frankfurt
    plan: free
    rootDir: apps/backend
    buildCommand: npm install && npm run build && npx prisma generate && npx prisma db push --accept-data-loss --skip-generate
    startCommand: node dist/main
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: lochin-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: OTP_TTL_SECONDS
        value: 120
      - key: OTP_RETRY_LIMIT
        value: 5
      - key: DELIVERY_BASE_FEE
        value: 6000
      - key: DELIVERY_PER_KM_FEE
        value: 1400
      - key: PAYMENT_CALLBACK_SECRET
        generateValue: true
